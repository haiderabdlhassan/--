<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رسالة حب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@500;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#241221;
    --night-2:#301A2C;
    --rose:#D98B8B;
    --rose-light:#F0BEBE;
    --gold:#C9A15A;
    --gold-light:#E4C583;
    --paper:#FBF3E7;
    --paper-2:#F3E7D6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; min-height:100%;
    background:radial-gradient(ellipse at 50% -10%, #3A2036 0%, var(--night) 55%, #180B16 100%);
    font-family:'Tajawal', sans-serif;
    color:var(--paper);
    overflow-x:hidden;
  }
  body{
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px 16px;
  }
  .stars{
    position:fixed; inset:0; pointer-events:none; z-index:0;
  }
  .stars span{
    position:absolute; width:2px; height:2px; background:var(--gold-light);
    border-radius:50%; opacity:.35;
    animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:.15;} 50%{opacity:.7;}}

  .stage{
    position:relative; z-index:1;
    width:100%; max-width:420px;
  }

  /* ===== المظروف ===== */
  #envelopeScreen{
    display:flex; flex-direction:column; align-items:center; gap:26px;
    text-align:center; padding:20px 10px;
  }
  .envelope{
    position:relative;
    width:230px; height:150px;
    cursor:pointer;
  }
  .env-back{
    position:absolute; inset:0;
    background:linear-gradient(160deg, var(--paper-2), var(--paper));
    border-radius:8px;
    box-shadow:0 20px 40px -14px rgba(0,0,0,.6);
  }
  .env-flap{
    position:absolute; top:0; left:0; right:0; height:78px;
    background:linear-gradient(160deg, #E9D8C1, var(--paper-2));
    clip-path:polygon(0 0, 100% 0, 50% 68%);
    transform-origin:top center;
    transition:transform .6s cubic-bezier(.6,-0.28,.5,1.4);
    border-radius:8px 8px 0 0;
  }
  .envelope.open .env-flap{ transform:rotateX(180deg); }

  .seal{
    position:absolute; top:56px; left:50%; transform:translate(-50%,0);
    width:52px; height:52px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #C9524F, #7E211F 75%);
    box-shadow:0 6px 14px -4px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.08);
    display:flex; align-items:center; justify-content:center;
    z-index:3;
    transition:transform .35s ease, opacity .35s ease;
  }
  .seal::after{
    content:"♥";
    color:rgba(255,255,255,.85);
    font-size:18px;
  }
  .envelope.open .seal{
    transform:translate(-50%,-6px) scale(.4) rotate(25deg);
    opacity:0;
  }

  .env-hint{
    font-size:13px; color:var(--rose-light); letter-spacing:.3px;
  }
  .env-title{
    font-family:'Aref Ruqaa', serif; font-size:26px; font-weight:700;
    color:var(--paper); margin:0;
  }

  /* ===== الرسالة ===== */
  #letterScreen{
    display:none;
    animation:riseIn .6s ease both;
  }
  @keyframes riseIn{
    from{opacity:0; transform:translateY(24px);}
    to{opacity:1; transform:translateY(0);}
  }
  .letter{
    background:linear-gradient(175deg, var(--paper) 0%, var(--paper-2) 100%);
    border-radius:14px;
    padding:30px 24px 26px;
    color:#3A2A22;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.6);
    position:relative;
  }
  .letter::before{
    content:"";
    position:absolute; inset:10px;
    border:1px solid rgba(58,42,34,.18);
    border-radius:8px;
    pointer-events:none;
  }
  .to-row{
    font-family:'Aref Ruqaa', serif; font-size:20px; font-weight:700;
    color:#5A2E3D; margin-bottom:16px; text-align:center;
    outline:none; border-bottom:1px dashed rgba(90,46,61,.3);
    padding-bottom:8px;
  }
  .to-row[contenteditable]:focus{ background:rgba(217,139,139,.08); }
  .body-text{
    font-size:15.5px; line-height:2.15; white-space:pre-wrap;
    outline:none; min-height:160px;
    font-family:'Tajawal', sans-serif;
  }
  .body-text[contenteditable]:focus{ background:rgba(217,139,139,.06); border-radius:6px; }
  .sign-row{
    margin-top:18px; text-align:left; direction:ltr;
    font-family:'Aref Ruqaa', serif; font-size:18px; color:#5A2E3D;
    outline:none;
  }

  .hint-edit{
    text-align:center; font-size:11px; color:#8a7263; margin-top:4px;
  }

  /* ===== أدوات الموسيقى ===== */
  .music-bar{
    margin-top:18px;
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    padding:10px 14px;
  }
  .music-btn{
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg, var(--gold), var(--gold-light));
    border:none; color:var(--night); font-size:15px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .music-label{
    font-size:12.5px; color:var(--rose-light); flex:1;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .music-upload{
    font-size:11.5px; color:var(--gold-light);
    background:rgba(201,161,90,.14);
    border:1px solid rgba(201,161,90,.35);
    border-radius:10px; padding:7px 10px;
    cursor:pointer; white-space:nowrap;
  }
  #audioInput{ display:none; }

  .actions{
    margin-top:16px; display:flex; gap:10px;
  }
  .actions button{
    flex:1; border:none; border-radius:12px; padding:12px;
    font-family:'Tajawal'; font-weight:700; font-size:13.5px; cursor:pointer;
  }
  #resetBtn{ background:rgba(255,255,255,.08); color:var(--paper); border:1px solid rgba(255,255,255,.15); }
  #closeBtn{ background:linear-gradient(135deg, var(--rose), var(--rose-light)); color:#3A1520; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="stage">

  <div id="envelopeScreen">
    <p class="env-title">لك رسالة</p>
    <div class="envelope" id="envelope">
      <div class="env-back"></div>
      <div class="seal" id="seal"></div>
      <div class="env-flap"></div>
    </div>
    <p class="env-hint">اضغط على الختم لفتح الرسالة</p>
  </div>

  <div id="letterScreen">
    <div class="letter">
      <div class="to-row" contenteditable="true" id="toName">إلى أغلى شخص عندي</div>

      <div class="body-text" contenteditable="true" id="bodyText">في كل يوم أشكر الأقدار اللي جابتك لحياتي.
وجودك بس يخليني أحس إن كل شي رح يصير بخير.
أحبك أكثر من الكلام، وأتمنى دايماً تكون مبتسم وسعيد.</div>
      <div class="hint-edit">اضغط على أي نص وعدّله بالكلمات اللي تريدها</div>

      <div class="sign-row" contenteditable="true" id="signName">— قلبك</div>

      <div class="music-bar">
        <button class="music-btn" id="playBtn">▶</button>
        <span class="music-label" id="musicLabel">ما فيه موسيقى بعد</span>
        <label class="music-upload" for="audioInput">اختر موسيقى</label>
        <input type="file" id="audioInput" accept="audio/*">
      </div>
      <audio id="audioEl" loop></audio>
    </div>

    <div class="actions">
      <button id="resetBtn">إغلاق الرسالة</button>
      <button id="closeBtn">تم</button>
    </div>
  </div>

</div>

<script>
  // خلفية نجوم بسيطة
  const starsWrap = document.getElementById('stars');
  for(let i=0;i<40;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*3)+'s';
    starsWrap.appendChild(s);
  }

  const envelope = document.getElementById('envelope');
  const envelopeScreen = document.getElementById('envelopeScreen');
  const letterScreen = document.getElementById('letterScreen');
  const resetBtn = document.getElementById('resetBtn');
  const closeBtn = document.getElementById('closeBtn');

  envelope.addEventListener('click', () => {
    envelope.classList.add('open');
    setTimeout(() => {
      envelopeScreen.style.display = 'none';
      letterScreen.style.display = 'block';
      if(audioEl.src){
        audioEl.play().then(() => { playBtn.textContent = '⏸'; }).catch(() => {});
      }
    }, 480);
  });

  resetBtn.addEventListener('click', () => {
    letterScreen.style.display = 'none';
    envelopeScreen.style.display = 'flex';
    envelope.classList.remove('open');
    audioEl.pause();
    playBtn.textContent = '▶';
  });

  closeBtn.addEventListener('click', () => {
    closeBtn.textContent = '💛';
    setTimeout(() => closeBtn.textContent = 'تم', 900);
  });

  // حفظ التعديلات تلقائياً بمتصفح الجهاز
  const toName = document.getElementById('toName');
  const bodyText = document.getElementById('bodyText');
  const signName = document.getElementById('signName');
  const STORAGE_KEY = 'love-letter-content';

  function saveContent(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        to: toName.innerText,
        body: bodyText.innerText,
        sign: signName.innerText
      }));
    }catch(e){}
  }

  function loadContent(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const data = JSON.parse(raw);
      if(data.to) toName.innerText = data.to;
      if(data.body) bodyText.innerText = data.body;
      if(data.sign) signName.innerText = data.sign;
    }catch(e){}
  }
  loadContent();

  [toName, bodyText, signName].forEach(el => {
    el.addEventListener('input', saveContent);
    el.addEventListener('blur', saveContent);
  });

  // موسيقى الخلفية
  const audioInput = document.getElementById('audioInput');
  const audioEl = document.getElementById('audioEl');
  const playBtn = document.getElementById('playBtn');
  const musicLabel = document.getElementById('musicLabel');

  // تخزين الموسيقى بذاكرة أكبر (IndexedDB) بدل localStorage المحدودة الحجم
  function openMusicDB(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('love-letter-db', 1);
      req.onupgradeneeded = () => {
        req.result.createObjectStore('music');
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function saveMusic(blob, name){
    try{
      const db = await openMusicDB();
      const tx = db.transaction('music', 'readwrite');
      tx.objectStore('music').put(blob, 'file');
      tx.objectStore('music').put(name, 'name');
      return new Promise((resolve) => { tx.oncomplete = resolve; tx.onerror = resolve; });
    }catch(e){ /* تعذّر الحفظ، بيشتغل بس بهذي الجلسة */ }
  }

  async function loadSavedMusic(){
    try{
      const db = await openMusicDB();
      const tx = db.transaction('music', 'readonly');
      const fileReq = tx.objectStore('music').get('file');
      const nameReq = tx.objectStore('music').get('name');
      return new Promise((resolve) => {
        tx.oncomplete = () => resolve({ blob: fileReq.result, name: nameReq.result });
        tx.onerror = () => resolve(null);
      });
    }catch(e){ return null; }
  }

  audioInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const objectUrl = URL.createObjectURL(file);
    audioEl.src = objectUrl;
    musicLabel.textContent = file.name;
    audioEl.play().then(() => { playBtn.textContent = '⏸'; }).catch(() => {});
    saveMusic(file, file.name);
  });

  // استرجاع الموسيقى المحفوظة سابقاً
  loadSavedMusic().then((result) => {
    if(result && result.blob){
      audioEl.src = URL.createObjectURL(result.blob);
      musicLabel.textContent = result.name || 'موسيقى محفوظة';
    }
  });

  playBtn.addEventListener('click', () => {
    if(!audioEl.src){ audioInput.click(); return; }
    if(audioEl.paused){ audioEl.play(); playBtn.textContent = '⏸'; }
    else { audioEl.pause(); playBtn.textContent = '▶'; }
  });
</script>

</body>
</html>
